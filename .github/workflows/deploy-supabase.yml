name: Deploy Supabase schema

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      CLEANUP_SECRET: ${{ secrets.SUPABASE_CLEANUP_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref gjgeairzynwblfrpojyc --password "$SUPABASE_DB_PASSWORD"
      - run: supabase db push
      - run: supabase secrets set CLEANUP_SECRET="$CLEANUP_SECRET" --project-ref gjgeairzynwblfrpojyc
      - run: supabase functions deploy cleanup-temporary-media --project-ref gjgeairzynwblfrpojyc
