name: Deploy Blockaroo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  supabase:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify Supabase release secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref gjgeairzynwblfrpojyc --password "$SUPABASE_DB_PASSWORD"
      - run: supabase db push

  world-worker:
    needs: supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
        working-directory: worker
      - run: npm run check
        working-directory: worker
      - name: Deploy with TURN relay
        if: ${{ secrets.CLOUDFLARE_TURN_KEY_ID != '' && secrets.CLOUDFLARE_TURN_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
          secrets: |
            TICKET_SECRET
            MEDIA_SECRET
            CLOUDFLARE_TURN_KEY_ID
            CLOUDFLARE_TURN_API_TOKEN
        env:
          TICKET_SECRET: ${{ secrets.WORLD_TICKET_SECRET }}
          MEDIA_SECRET: ${{ secrets.WORLD_MEDIA_SECRET }}
          CLOUDFLARE_TURN_KEY_ID: ${{ secrets.CLOUDFLARE_TURN_KEY_ID }}
          CLOUDFLARE_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
      - name: Deploy without optional TURN relay
        if: ${{ secrets.CLOUDFLARE_TURN_KEY_ID == '' || secrets.CLOUDFLARE_TURN_API_TOKEN == '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
          secrets: |
            TICKET_SECRET
            MEDIA_SECRET
        env:
          TICKET_SECRET: ${{ secrets.WORLD_TICKET_SECRET }}
          MEDIA_SECRET: ${{ secrets.WORLD_MEDIA_SECRET }}

  deploy:
    needs: world-worker
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://gjgeairzynwblfrpojyc.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_rKxx_3UTm8rn_M4OEMjMNQ_r8Wxgxss
          VITE_WORLD_SOCKET_URL: https://blockaroo-world-social.vfxblender.workers.dev
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
