name: Deploy Blockaroo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://gjgeairzynwblfrpojyc.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_rKxx_3UTm8rn_M4OEMjMNQ_r8Wxgxss
          VITE_WORLD_SOCKET_URL: ${{ vars.VITE_WORLD_SOCKET_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
