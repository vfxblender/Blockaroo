name: Deploy world worker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_TURN_KEY_ID: ${{ secrets.CLOUDFLARE_TURN_KEY_ID }}
      CLOUDFLARE_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
        working-directory: worker
      - run: npm run check
        working-directory: worker
      - name: Deploy with TURN relay
        if: ${{ env.CLOUDFLARE_TURN_KEY_ID != '' && env.CLOUDFLARE_TURN_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
          secrets: |
            TICKET_SECRET
            MEDIA_SECRET
            CLOUDFLARE_TURN_KEY_ID
            CLOUDFLARE_TURN_API_TOKEN
        env:
          TICKET_SECRET: ${{ secrets.WORLD_TICKET_SECRET }}
          MEDIA_SECRET: ${{ secrets.WORLD_MEDIA_SECRET }}
      - name: Deploy without optional TURN relay
        if: ${{ env.CLOUDFLARE_TURN_KEY_ID == '' || env.CLOUDFLARE_TURN_API_TOKEN == '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
          secrets: |
            TICKET_SECRET
            MEDIA_SECRET
        env:
          TICKET_SECRET: ${{ secrets.WORLD_TICKET_SECRET }}
          MEDIA_SECRET: ${{ secrets.WORLD_MEDIA_SECRET }}
